<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bouncing box</title>
  </head>
  <body>
    <canvas id="canvas" height="800" width="900"></canvas>
  </body>
</html>
<script>
  let canvas = document.getElementById("canvas");
  let ctx = canvas.getContext("2d");
  let x = [2, 5, 8, 1, 3, 9, 7, 4, 11, 6];
  let y = [12, 6, 17, 2, 8, 10, 4, 5, 9, 7];
  let directionx = [6, 2, 7, 9, 8, 3, 1, 4, 10, 11];
  let directiony = [2, 6, 7, 3, 1, 8, 10, 11, 9, 13];
  setInterval(moveBox, 16);

  function moveBox() {
    //box changing x and y by 35
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (var i = 0; i < 10; i = i + 1) {
      x[i] = x[i] + directionx[i];
      y[i] = y[i] + directiony[i];
      ctx.fillRect(x, y, 50, 50);
      if (x[i] > 900) {
        directionx[i] = -directionx[i];
      }
      if (x[i] < 0) {
        directionx[i] = -directionx[i];
      }
      if (y[i] > 700) {
        directiony[i] = -directiony[i];
      }
      if (y[i] < 0) {
        directiony[i] = -directiony[i];
      }
    }
  }
</script>
